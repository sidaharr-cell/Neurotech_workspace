name: Daily Neurotech Refresh

on:
  schedule:
    - cron: '0 6 * * *'   # every day at 6am UTC
  workflow_dispatch:        # lets you trigger manually from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write   # allows committing the refreshed funding.json

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: neurotech-index/package-lock.json

      - name: Install dependencies
        working-directory: neurotech-index
        run: npm ci

      - name: Run refresh
        working-directory: neurotech-index
        run: node scripts/refresh.js
        env:
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          NEWS_API_KEY:         ${{ secrets.NEWS_API_KEY }}

      - name: Refresh company funding (SEC EDGAR)
        working-directory: neurotech-index
        run: node scripts/backfill-funding.js

      - name: Commit updated data (funding + notable research)
        run: |
          git config user.name "neurobase-bot"
          git config user.email "bot@users.noreply.github.com"
          git add neurotech-index/src/data/funding.json neurotech-index/src/data/notable.json
          if git diff --cached --quiet; then
            echo "No data changes."; exit 0
          fi
          git commit -m "chore: auto-update funding + notable research [skip ci]"
          # Rebase onto any commits pushed while the job ran (deploys, etc.),
          # then push. Retry so the job never fails a simple race.
          for i in 1 2 3; do
            if git pull --rebase --autostash origin main && git push; then
              echo "pushed on attempt $i"; exit 0
            fi
            echo "push attempt $i lost a race, retrying..."; sleep 5
          done
          echo "::error::could not push data update after 3 attempts"; exit 1
