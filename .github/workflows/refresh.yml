name: Daily Neurotech Refresh

on:
  schedule:
    - cron: '0 6 * * *'   # every day at 6am UTC
  workflow_dispatch:        # lets you trigger manually from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write   # allows committing the refreshed funding.json

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: neurotech-index/package-lock.json

      - name: Install dependencies
        working-directory: neurotech-index
        run: npm ci

      - name: Run refresh
        working-directory: neurotech-index
        run: node scripts/refresh.js
        env:
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          NEWS_API_KEY:         ${{ secrets.NEWS_API_KEY }}

      - name: Refresh company funding (SEC EDGAR)
        working-directory: neurotech-index
        run: node scripts/backfill-funding.js

      - name: Commit updated funding data
        run: |
          git config user.name "neurobase-bot"
          git config user.email "bot@users.noreply.github.com"
          if ! git diff --quiet -- neurotech-index/src/data/funding.json; then
            git add neurotech-index/src/data/funding.json
            git commit -m "chore: auto-update company funding (SEC Form D) [skip ci]"
            git push
          else
            echo "No funding changes."
          fi
